name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DyslexiaDrawNote-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DyslexiaDrawNote-main/package-lock.json
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Run tests
        run: npm run test
      - name: Build app
        run: npm run build
